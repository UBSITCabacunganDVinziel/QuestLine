<main style="max-width: 900px; margin: 0 auto; padding: 20px; font-family: sans-serif;">
  <h1 style="text-align: center; color: #d4af37;">⚔️ QuestLine ⚔️</h1>
  
  <!-- Registration and Login Interface Wrapper Controls -->
  <div style="display: flex; gap: 20px; justify-content: center; margin-bottom: 25px;">
    <app-sign-in></app-sign-in>
    <app-sign-up></app-sign-up>
  </div>

  <!-- Dynamic Account HUD Tracking -->
  <app-character-hud></app-character-hud>

  <!-- Core Content Working Columns -->
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 20px;">
    <app-quest-form></app-quest-form>
    <app-quest-list></app-quest-list>
  </div>
</main>
