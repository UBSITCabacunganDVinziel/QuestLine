@if (questService.isAuthenticated()) {
  
  <!-- UNIFIED ROW HEADER: Houses branding and controls on the exact same row line -->
  <header style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 2px dashed #313244; font-family: 'Courier New', monospace;">
    
    <div style="width: 280px;"></div>

    <h1 style="color: #a6e3a1; margin: 0; font-size: 2rem; letter-spacing: 3px; font-weight: bold; text-align: center; flex-grow: 1;">
      ⚔️ QUESTLINE ⚔️
    </h1>

    <div style="display: flex; gap: 10px; width: 280px; justify-content: flex-end;">
      <button (click)="deleteHeroAccountDirectly()" style="background: transparent; border: 1px solid #f38ba8; color: #f38ba8; padding: 6px 12px; font-family: monospace; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 0.8rem; white-space: nowrap;">
        ⚠️ DELETE ACCOUNT
      </button>

      <button (click)="questService.logoutPlayer()" style="background: #f38ba8; color: #111; border: none; padding: 6px 12px; font-family: monospace; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 0.8rem; white-space: nowrap;">
        LOGOUT
      </button>
    </div>
  </header>

  <app-quest-form></app-quest-form>
  <app-quest-list></app-quest-list>

} @else {
  
  @if (currentAuthSubPage() === 'signin') {
    <app-sign-in (onSwitchToSignUp)="navigateToPage('signup')"></app-sign-in>
  } @else {
    <app-sign-up (onSwitchToSignIn)="navigateToPage('signin')"></app-sign-up>
  }

}
