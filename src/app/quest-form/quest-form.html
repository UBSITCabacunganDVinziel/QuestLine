<div class="form-container">
  <h3>📜 Post an Adventure Quest</h3>
  <form (ngSubmit)="onSubmit()" #questForm="ngForm">
    
    <div class="input-group">
      <label for="choreSelect">Select Quest Objective</label>
      <select id="choreSelect" [(ngModel)]="selectedChoreId" name="selectedChoreId" required class="pixel-input">
        <option value="" disabled selected>-- Select your next task --</option>
        
        <optgroup label="🧹 Daily Maintenance">
          <option *ngFor="let chore of getChoresByCategory('Daily Maintenance')" [value]="chore.id">
            {{ chore.name }}
          </option>
        </optgroup>
  
        <optgroup label="🌱 Mental & Physical Health">
          <option *ngFor="let chore of getChoresByCategory('Mental & Physical')" [value]="chore.id">
            {{ chore.name }}
          </option>
        </optgroup>
  
        <optgroup label="🧠 Deep Focus & Admin">
          <option *ngFor="let chore of getChoresByCategory('Deep Focus & Admin')" [value]="chore.id">
            {{ chore.name }}
          </option>
        </optgroup>
  
        <optgroup label="⚔️ Epic Feats">
          <option *ngFor="let chore of getChoresByCategory('Epic Feats')" [value]="chore.id">
            {{ chore.name }}
          </option>
        </optgroup>
      </select>
    </div>

    <div *ngIf="selectedChoreId && getSelectedChoreMetadata() as chore" class="rewards-preview" style="margin: 15px 0; padding: 10px; border: 2px dashed #ffb400; background: rgba(0,0,0,0.2); border-radius: 4px;">
      <p style="margin: 5px 0; color: #ffb400; font-weight: bold;">⚡ Rank Tier: {{ chore.difficulty }}</p>
      <p style="margin: 5px 0;">⭐ XP Reward: +{{ rewardTiers[chore.difficulty].xp }}</p>
      <p style="margin: 5px 0;">🪙 Gold Reward: +{{ rewardTiers[chore.difficulty].gold }}g</p>
    </div>

    <button type="submit" [disabled]="!questForm.form.valid" class="post-btn">POST TO BOARD</button>
  </form>
</div>
