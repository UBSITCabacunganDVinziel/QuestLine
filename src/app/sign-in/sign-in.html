<div class="auth-box" style="max-width: 400px; margin: 60px auto; padding: 30px; background: #1e1e2e; border: 4px solid #45475a; border-radius: 8px; font-family: 'Courier New', monospace; color: #cdd6f4;">
    <h2 style="text-align: center; color: #f9e2af; margin-top: 0;">🔐 ACCESS GATEWAY</h2>
    <p style="text-align: center; font-size: 0.85rem; color: #6c7086; margin-bottom: 25px;">Enter your credentials to load your adventure session state.</p>
  
    <form (ngSubmit)="onSignIn()">
      <div style="margin-bottom: 15px;">
        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Player Username</label>
        <input type="text" [(ngModel)]="username" name="username" required style="width: 100%; padding: 10px; background: #11111b; border: 2px solid #313244; color: #fff; border-radius: 4px; box-sizing: border-box;" />
      </div>
  
      <div style="margin-bottom: 25px;">
        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Security Password</label>
        <input type="password" [(ngModel)]="password" name="password" required style="width: 100%; padding: 10px; background: #11111b; border: 2px solid #313244; color: #fff; border-radius: 4px; box-sizing: border-box;" />
      </div>
  
      <button type="submit" style="width: 100%; padding: 12px; background: #a6e3a1; color: #11111b; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 1rem; margin-bottom: 15px;">
        INITIATE SESSION LOGIN
      </button>
    </form>
  
    <p style="text-align: center; margin: 0; font-size: 0.85rem;">
      New character slot? 
      <a href="javascript:void(0)" (click)="onSwitchToSignUp.emit()" style="color: #89b4fa; font-weight: bold; text-decoration: none;">Create Character Entry</a>
    </p>
  </div>
